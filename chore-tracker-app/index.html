<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>家庭家务管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .login-panel {
            padding: 40px 20px;
            text-align: center;
        }

        .login-panel input {
            width: 100%;
            max-width: 280px;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .login-panel input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 48px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .main-content {
            display: none;
            padding: 25px 20px;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            flex-wrap: wrap;
        }

        .nav-tab {
            padding: 10px 20px;
            background: #f5f5f5;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .nav-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .task-item:hover {
            background: #f0f0f0;
        }

        .task-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            cursor: pointer;
        }

        .task-item label {
            flex: 1;
            cursor: pointer;
            font-size: 16px;
        }

        .task-item.completed label {
            text-decoration: line-through;
            color: #999;
        }

        .add-form {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .add-form input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .add-form input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-small {
            padding: 12px 20px;
            font-size: 14px;
        }

        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 36px;
            margin-bottom: 5px;
        }

        .stat-card p {
            opacity: 0.9;
            font-size: 14px;
        }

        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bar-item {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .bar-label {
            width: 100px;
            font-size: 14px;
        }

        .bar-bg {
            flex: 1;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            transition: width 0.5s;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-weight: bold;
            font-size: 12px;
        }

        .history-list {
            list-style: none;
        }

        .history-item {
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .history-tag {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            margin: 4px;
        }

        .logout-btn {
            width: 100%;
            margin-bottom: 15px;
            background: rgba(102, 126, 234, 0.1);
            border: 2px solid #667eea;
            color: #667eea;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        .msg {
            margin-top: 10px;
            font-size: 14px;
            padding: 10px;
            border-radius: 8px;
        }

        .msg.success {
            color: #4caf50;
            background: #e8f5e9;
        }

        .msg.error {
            color: #f5576c;
            background: #ffebee;
        }

        @media (max-width: 600px) {
            .add-form {
                flex-direction: column;
            }
            
            .bar-item {
                flex-direction: column;
                align-items: stretch;
            }
            
            .bar-label {
                width: 100%;
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登录界面 -->
        <div id="loginPanel" class="login-panel">
            <h2 style="margin-bottom: 30px; color: #333;">🔐 欢迎使用家务管理系统</h2>
            <input type="password" id="passwordInput" placeholder="请输入密码（默认：888888）" />
            <br/>
            <button class="btn" onclick="login()">登 录</button>
            <p id="loginError" class="msg error" style="display:none;"></p>
        </div>

        <!-- 主界面 -->
        <div id="mainContent" class="main-content">
            <button class="logout-btn" onclick="logout()">退出登录</button>
            
            <div class="header">
                <h1>🏠 家庭家务管理系统</h1>
                <p>记录每一天的家务完成情况</p>
            </div>

            <div class="nav-tabs">
                <button class="nav-tab active" onclick="switchTab('checkin')">📝 每日打卡</button>
                <button class="nav-tab" onclick="switchTab('manage')">📋 项目管理</button>
                <button class="nav-tab" onclick="switchTab('stats')">📊 统计分析</button>
            </div>

            <!-- 每日打卡 -->
            <div id="checkinTab" class="tab-content active">
                <h2 style="margin-bottom: 20px; color: #333;">今日家务打卡</h2>
                <p style="color: #666; margin-bottom: 20px;" id="currentDate"></p>
                <ul id="taskList" class="task-list"></ul>
                <button class="btn" onclick="submitCheckin()" style="margin-top: 20px; width: 100%;">✅ 提交打卡</button>
                <p id="checkinMsg" class="msg success" style="display:none;"></p>
            </div>

            <!-- 项目管理 -->
            <div id="manageTab" class="tab-content">
                <h2 style="margin-bottom: 20px; color: #333;">家务项目管理</h2>
                <p style="color: #666; margin-bottom: 20px;">添加或删除需要跟踪的家务项目</p>
                <ul id="manageList" class="task-list"></ul>
                <div class="add-form">
                    <input type="text" id="newTaskInput" placeholder="输入新的家务项目名称..." />
                    <button class="btn btn-small" onclick="addNewTask()">➕ 添加</button>
                </div>
                <p id="manageMsg" class="msg success" style="display:none;"></p>
            </div>

            <!-- 统计分析 -->
            <div id="statsTab" class="tab-content">
                <h2 style="margin-bottom: 20px; color: #333;">完成情况统计</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3 id="totalDays">0</h3>
                        <p>累计打卡天数</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="totalTasks">0</h3>
                        <p>完成家务总数</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="completionRate">0%</h3>
                        <p>平均完成率</p>
                    </div>
                </div>
                <div style="background: #f9f9f9; padding: 20px; border-radius: 15px; margin-top: 20px;">
                    <h3 style="margin-bottom: 15px; color: #333;">各项目完成次数</h3>
                    <div id="barChart" class="bar-chart"></div>
                </div>
                <div style="background: #f9f9f9; padding: 20px; border-radius: 15px; margin-top: 20px;">
                    <h3 style="margin-bottom: 15px; color: #333;">最近打卡记录</h3>
                    <ul id="historyList" class="history-list"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY_TASKS = 'chore_tasks';
        const STORAGE_KEY_HISTORY = 'chore_history';
        const STORAGE_KEY_AUTH = 'chore_authenticated';
        const DEFAULT_PASSWORD = '888888';

        const defaultTasks = ['洗碗', '扫地', '拖地', '洗衣服', '整理房间', '倒垃圾'];

        function getTasks() {
            const tasks = localStorage.getItem(STORAGE_KEY_TASKS);
            return tasks ? JSON.parse(tasks) : [...defaultTasks];
        }

        function saveTasks(tasks) {
            localStorage.setItem(STORAGE_KEY_TASKS, JSON.stringify(tasks));
            renderManageList();
            renderTaskList();
        }

        function getHistory() {
            const history = localStorage.getItem(STORAGE_KEY_HISTORY);
            return history ? JSON.parse(history) : [];
        }

        function saveHistory(history) {
            localStorage.setItem(STORAGE_KEY_HISTORY, JSON.stringify(history));
        }

        function checkAuth() {
            const authenticated = localStorage.getItem(STORAGE_KEY_AUTH);
            if (authenticated === 'true') {
                showMainContent();
            }
        }

        function login() {
            const password = document.getElementById('passwordInput').value.trim();
            const errorMsg = document.getElementById('loginError');
            
            if (password === DEFAULT_PASSWORD) {
                localStorage.setItem(STORAGE_KEY_AUTH, 'true');
                errorMsg.style.display = 'none';
                showMainContent();
            } else {
                errorMsg.textContent = '密码错误，请重试';
                errorMsg.style.display = 'block';
            }
        }

        function logout() {
            localStorage.removeItem(STORAGE_KEY_AUTH);
            location.reload();
        }

        function showMainContent() {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            initApp();
        }

        function initApp() {
            const today = new Date();
            const dateStr = today.toLocaleDateString('zh-CN', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                weekday: 'long'
            });
            document.getElementById('currentDate').textContent = dateStr;
            renderTaskList();
            renderManageList();
            updateStats();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName + 'Tab').classList.add('active');
            
            if (tabName === 'stats') {
                updateStats();
            }
        }

        function renderTaskList() {
            const tasks = getTasks();
            const taskList = document.getElementById('taskList');
            taskList.innerHTML = '';
            
            if (tasks.length === 0) {
                taskList.innerHTML = '<li style="text-align:center;color:#999;padding:30px;">暂无家务项目，请先在"项目管理"中添加</li>';
                return;
            }
            
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = 'task-item';
                li.innerHTML = `
                    <input type="checkbox" id="task_${index}" />
                    <label for="task_${index}">${task}</label>
                `;
                taskList.appendChild(li);
            });
        }

        function submitCheckin() {
            const tasks = getTasks();
            const completedTasks = [];
            
            tasks.forEach((task, index) => {
                const checkbox = document.getElementById(`task_${index}`);
                if (checkbox && checkbox.checked) {
                    completedTasks.push(task);
                }
            });
            
            if (completedTasks.length === 0) {
                alert('请至少选择一项完成的家务！');
                return;
            }
            
            const today = new Date().toLocaleDateString('zh-CN');
            const history = getHistory();
            
            // 检查今天是否已经打卡
            const existingIndex = history.findIndex(h => h.date === today);
            if (existingIndex !== -1) {
                if (!confirm('今天已经打过卡了，要覆盖之前的记录吗？')) {
                    return;
                }
                history.splice(existingIndex, 1);
            }
            
            history.unshift({
                date: today,
                tasks: completedTasks,
                timestamp: Date.now()
            });
            
            saveHistory(history);
            
            const msgEl = document.getElementById('checkinMsg');
            msgEl.textContent = `✅ 打卡成功！今天完成了 ${completedTasks.length} 项家务`;
            msgEl.style.display = 'block';
            
            setTimeout(() => {
                msgEl.style.display = 'none';
            }, 3000);
            
            // 重置复选框
            document.querySelectorAll('#taskList input[type="checkbox"]').forEach(cb => cb.checked = false);
        }

        function renderManageList() {
            const tasks = getTasks();
            const manageList = document.getElementById('manageList');
            manageList.innerHTML = '';
            
            if (tasks.length === 0) {
                manageList.innerHTML = '<li style="text-align:center;color:#999;padding:30px;">暂无项目</li>';
                return;
            }
            
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = 'task-item';
                li.innerHTML = `
                    <label>${task}</label>
                    <button class="btn btn-small btn-danger" onclick="deleteTask(${index})">🗑️ 删除</button>
                `;
                manageList.appendChild(li);
            });
        }

        function addNewTask() {
            const input = document.getElementById('newTaskInput');
            const newTask = input.value.trim();
            
            if (!newTask) {
                alert('请输入家务项目名称！');
                return;
            }
            
            const tasks = getTasks();
            if (tasks.includes(newTask)) {
                alert('该项目已存在！');
                return;
            }
            
            tasks.push(newTask);
            saveTasks(tasks);
            
            input.value = '';
            
            const msgEl = document.getElementById('manageMsg');
            msgEl.textContent = `✅ 已添加 "${newTask}"`;
            msgEl.style.display = 'block';
            
            setTimeout(() => {
                msgEl.style.display = 'none';
            }, 3000);
        }

        function deleteTask(index) {
            const tasks = getTasks();
            const deletedTask = tasks[index];
            
            if (confirm(`确定要删除 "${deletedTask}" 吗？`)) {
                tasks.splice(index, 1);
                saveTasks(tasks);
            }
        }

        function updateStats() {
            const history = getHistory();
            const tasks = getTasks();
            
            const totalDays = history.length;
            let totalCompleted = 0;
            const taskCountMap = {};
            
            tasks.forEach(task => {
                taskCountMap[task] = 0;
            });
            
            history.forEach(record => {
                totalCompleted += record.tasks.length;
                record.tasks.forEach(task => {
                    if (taskCountMap[task] !== undefined) {
                        taskCountMap[task]++;
                    }
                });
            });
            
            const avgCompletion = tasks.length > 0 
                ? Math.round((totalCompleted / (totalDays * tasks.length || 1)) * 100) 
                : 0;
            
            document.getElementById('totalDays').textContent = totalDays;
            document.getElementById('totalTasks').textContent = totalCompleted;
            document.getElementById('completionRate').textContent = avgCompletion + '%';
            
            renderBarChart(taskCountMap);
            renderHistory(history);
        }

        function renderBarChart(taskCountMap) {
            const chartContainer = document.getElementById('barChart');
            chartContainer.innerHTML = '';
            
            const tasks = Object.entries(taskCountMap);
            
            if (tasks.length === 0) {
                chartContainer.innerHTML = '<p style="text-align:center;color:#999;padding:20px;">暂无数据</p>';
                return;
            }
            
            const maxValue = Math.max(...tasks.map(([_, count]) => count), 1);
            
            tasks.forEach(([task, count]) => {
                const percentage = Math.round((count / maxValue) * 100);
                
                const barItem = document.createElement('div');
                barItem.className = 'bar-item';
                barItem.innerHTML = `
                    <div class="bar-label">${task}</div>
                    <div class="bar-bg">
                        <div class="bar-fill" style="width: ${percentage}%">${count}</div>
                    </div>
                `;
                chartContainer.appendChild(barItem);
            });
        }

        function renderHistory(history) {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            
            const recentHistory = history.slice(0, 10);
            
            if (recentHistory.length === 0) {
                historyList.innerHTML = '<li style="text-align:center;color:#999;padding:30px;">暂无打卡记录</li>';
                return;
            }
            
            recentHistory.forEach(record => {
                const li = document.createElement('li');
                li.className = 'history-item';
                
                const tagsHtml = record.tasks.map(task => 
                    `<span class="history-tag">${task}</span>`
                ).join('');
                
                li.innerHTML = `
                    <div style="font-weight:bold;color:#667eea;margin-bottom:8px;">📅 ${record.date}</div>
                    <div>${tagsHtml}</div>
                `;
                historyList.appendChild(li);
            });
        }

        // 绑定回车键登录
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });

        // 页面加载时检查登录状态
        checkAuth();
    </script>
</body>
</html>
